<!DOCTYPE html>
<html>
<head>
<title>BringMe.Store Icon Generator</title>
</head>
<body>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c180" width="180" height="180" style="display:none"></canvas>
<canvas id="c32" width="32" height="32" style="display:none"></canvas>
<canvas id="c16" width="16" height="16" style="display:none"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.15; // corner radius

  // Background — navy with rounded corners
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#0A1628';
  ctx.fill();

  // Gold circle background for pin
  const cx = size * 0.5;
  const cy = size * 0.42;
  const pinR = size * 0.28;

  // Draw map pin shape
  ctx.beginPath();
  ctx.arc(cx, cy, pinR, Math.PI, 0, false);
  ctx.lineTo(cx + pinR * Math.cos(Math.PI * 0.1), cy + pinR * Math.sin(Math.PI * 0.1));
  // Pin tail
  ctx.quadraticCurveTo(cx + pinR * 0.5, cy + pinR * 1.8, cx, cy + pinR * 2.2);
  ctx.quadraticCurveTo(cx - pinR * 0.5, cy + pinR * 1.8, cx - pinR * Math.cos(Math.PI * 0.1), cy + pinR * Math.sin(Math.PI * 0.1));
  ctx.closePath();
  ctx.fillStyle = '#C6973F';
  ctx.fill();

  // Inner circle (navy)
  ctx.beginPath();
  ctx.arc(cx, cy, pinR * 0.55, 0, Math.PI * 2);
  ctx.fillStyle = '#0A1628';
  ctx.fill();

  // Letter B in inner circle
  ctx.fillStyle = '#C6973F';
  ctx.font = `bold ${size * 0.22}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('B', cx, cy);

  // "BRING ME" text at bottom for larger sizes
  if (size >= 192) {
    ctx.fillStyle = '#C6973F';
    ctx.font = `bold ${size * 0.085}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('BRINGME', cx, size * 0.88);

    // Dot separator
    ctx.beginPath();
    ctx.arc(cx, size * 0.94, size * 0.018, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(201,169,110,0.4)';
    ctx.fill();
  }
}

// Generate all sizes
const sizes = [
  { id: 'c512', size: 512, name: 'icon-512.png' },
  { id: 'c192', size: 192, name: 'icon-192.png' },
  { id: 'c180', size: 180, name: 'apple-touch-icon.png' },
  { id: 'c32',  size: 32,  name: 'favicon-32.png' },
  { id: 'c16',  size: 16,  name: 'favicon-16.png' },
];

sizes.forEach(({ id, size, name }) => {
  const canvas = document.getElementById(id);
  drawIcon(canvas, size);
});

// Show preview
document.body.innerHTML += `
  <div style="font-family:sans-serif;padding:24px;background:#0f1628;min-height:100vh">
    <h2 style="color:#c9a96e;margin-bottom:24px">BringMe.Store — Icon Preview</h2>
    <div style="display:flex;gap:24px;align-items:flex-end;flex-wrap:wrap;margin-bottom:32px">
      ${sizes.map(({id,size,name}) => `
        <div style="text-align:center">
          <canvas id="prev-${size}" width="${size}" height="${size}" style="max-width:128px;border-radius:${size*0.15}px;box-shadow:0 4px 20px rgba(0,0,0,.5)"></canvas>
          <div style="color:#c9a96e;font-size:12px;margin-top:8px">${name}</div>
          <div style="color:#445;font-size:11px">${size}×${size}</div>
        </div>`).join('')}
    </div>
    <h3 style="color:#c9a96e;margin-bottom:16px">Download Links</h3>
    <div id="links" style="display:flex;flex-direction:column;gap:8px"></div>
    <div style="margin-top:32px;background:#1a2340;border-radius:14px;padding:20px">
      <h3 style="color:#c9a96e;margin-bottom:12px">📋 HTML to add to all your pages</h3>
      <pre id="html-code" style="color:#8899cc;font-size:13px;line-height:1.6;white-space:pre-wrap"></pre>
    </div>
  </div>`;

// Copy canvases to preview
sizes.forEach(({id, size}) => {
  const src = document.getElementById(id);
  const dst = document.getElementById('prev-' + size);
  const ctx = dst.getContext('2d');
  ctx.drawImage(src, 0, 0);
});

// Generate download links
const linksEl = document.getElementById('links');
sizes.forEach(({id, size, name}) => {
  const canvas = document.getElementById(id);
  const url = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.style.cssText = 'display:inline-flex;align-items:center;gap:8px;background:#c9a96e;color:#0f1628;padding:9px 18px;border-radius:9px;font-weight:700;font-size:13px;text-decoration:none;width:fit-content';
  a.innerHTML = `⬇️ Download ${name} (${size}×${size})`;
  linksEl.appendChild(a);
});

// Generate HTML snippet
document.getElementById('html-code').textContent = `<!-- Favicon & App Icons — add to <head> of all pages -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f1628">`;
</script>
</body>
</html>
